spring:
  flyway:
    validate-on-migrate: false   # désactivé en dev : permet de modifier les migrations sans repair
  data:
    redis:
      connect-timeout: 500ms     # fail-fast si Redis absent
      timeout: 500ms

cfg:
  jwt:
    access-token-expiry-ms: 28800000   # 8 heures en dev (défaut prod : 15 min)
